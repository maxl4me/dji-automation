[app]
base_url = https://www.dji.com/global
store_base_url = https://store.dji.com

[browser]
# One of: chromium, firefox, webkit. We use chromium.
browser_type = chromium
headless = false
slow_mo_ms = 0

[timeouts]
# Default wait-for-element timeout. Marketing sites load slow under anti-bot; keep generous.
default_timeout_ms = 15000
# Text visibility checks (contains_text) — shorter, used for assertions that should fail fast when absent.
text_timeout_ms = 5000
# Navigation timeout for page.goto.
navigation_timeout_ms = 30000

[debug]
# Highlight elements during interactions. Useful locally, noisy in CI.
highlight_elements = false

[tracing]
# Playwright trace captured per test. Kept only on failure.
enabled = true
